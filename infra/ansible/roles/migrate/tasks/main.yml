---
- name: Install Alembic and database dependencies
  ansible.builtin.pip:
    name:
      - alembic>=1.14,<2
      - sqlalchemy>=2.0,<3
      - asyncpg>=0.30,<1
      - psycopg2-binary>=2.9,<3
    state: present

- name: Run Alembic migrations
  ansible.builtin.command:
    cmd: >-
      alembic -c alembic.ini upgrade head
    chdir: "{{ playbook_dir }}/../../"
  environment:
    DATABASE_URL: "{{ database_url }}"
  register: migration_result
  changed_when: "'Running upgrade' in migration_result.stdout"

- name: Display migration output
  ansible.builtin.debug:
    msg: "{{ migration_result.stdout_lines }}"
  when: migration_result.stdout_lines | length > 0
